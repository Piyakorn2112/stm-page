# Cloudflare Tunnel routing for the Srang Tech Mai site.
# tunnel id + credentials file name must match the named tunnel for this app.
# The credentials JSON (secret) is mounted at /etc/cloudflared/creds and is NOT
# stored in this repo (it lives on the host under CF_CREDS_DIR).
#
# This tunnel lives in the Cloudflare account that owns srangtechmai.tech, so the
# public hostnames below bind correctly (see deploy/README.md).
tunnel: adc21b2b-31dc-45b2-b23a-b568c67df3bc
credentials-file: /etc/cloudflared/creds/adc21b2b-31dc-45b2-b23a-b568c67df3bc.json

ingress:
  - hostname: srangtechmai.tech
    service: http://app:3000
  - hostname: www.srangtechmai.tech
    service: http://app:3000
  - service: http_status:404
